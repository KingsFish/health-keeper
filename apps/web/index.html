<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthKeeper - 医疗档案管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .modal { display: none; }
        .modal.active { display: flex; }

        /* 预览模态框样式 */
        #previewModal { background: rgba(0,0,0,0.9); }
        #previewModal .preview-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }
        #previewModal img, #previewModal iframe {
            max-width: 90vw;
            max-height: 85vh;
            transition: transform 0.2s ease;
        }
        #previewModal .preview-toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
        }
        #previewModal .preview-toolbar button {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        #previewModal .preview-toolbar button:hover {
            background: rgba(255,255,255,0.2);
        }
        #previewModal .preview-filename {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
        }
        #previewModal .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 32px;
            cursor: pointer;
            background: none;
            border: none;
        }
        #previewModal .close-btn:hover { color: #ccc; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">🏥 HealthKeeper</h1>
            <p class="text-gray-600 mt-1">医疗档案管理系统</p>
        </header>

        <!-- Search Bar -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex gap-4 mb-4">
                <input type="text" id="searchInput" placeholder="搜索病历、诊断、药物..."
                    class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="search()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    搜索
                </button>
                <button onclick="toggleFilters()" class="border px-4 py-2 rounded-lg hover:bg-gray-50">
                    <span id="filterToggleText">高级筛选</span>
                </button>
            </div>
            <!-- Filters -->
            <div id="filtersPanel" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 pt-4 border-t">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">成员</label>
                    <select id="filterPerson" class="w-full border rounded-lg px-3 py-2">
                        <option value="">全部成员</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">医院</label>
                    <input type="text" id="filterHospital" placeholder="输入医院名称" class="w-full border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">医生</label>
                    <select id="filterDoctor" class="w-full border rounded-lg px-3 py-2">
                        <option value="">全部医生</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Persons Panel -->
            <div class="bg-white rounded-lg shadow">
                <div class="p-4 border-b flex justify-between items-center">
                    <h2 class="text-lg font-semibold">家庭成员</h2>
                    <button onclick="showPersonModal()" class="text-blue-600 hover:text-blue-800">+ 添加</button>
                </div>
                <div id="personsList" class="divide-y max-h-96 overflow-y-auto"></div>
            </div>

            <!-- Visits Panel -->
            <div class="lg:col-span-2 bg-white rounded-lg shadow">
                <div class="p-4 border-b flex justify-between items-center">
                    <h2 class="text-lg font-semibold">就诊记录</h2>
                    <button onclick="showVisitModal()" class="text-blue-600 hover:text-blue-800 font-medium">+ 添加记录</button>
                </div>
                <div id="visitsList" class="divide-y max-h-[600px] overflow-y-auto"></div>
            </div>
        </div>

        <!-- Extraction Result Modal -->
        <div id="extractionModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
            <div class="bg-white rounded-lg max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white">
                    <h3 class="text-lg font-semibold" id="extractionModalTitle">AI 提取结果</h3>
                    <button onclick="closeExtractionModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                </div>
                <div id="extractionModalContent" class="p-4"></div>
                <div class="p-4 border-t flex justify-end gap-2 bg-gray-50">
                    <button onclick="closeExtractionModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-100">关闭</button>
                    <button onclick="applyExtractionToVisit()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">应用到记录</button>
                </div>
            </div>
        </div>

        <!-- Visit Detail Modal -->
        <div id="visitDetailModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
            <div class="bg-white rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white">
                    <h3 class="text-lg font-semibold" id="visitDetailTitle">就诊详情</h3>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleVisitEditMode()" id="visitEditBtn" class="px-3 py-1 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">编辑</button>
                        <button onclick="closeVisitDetail()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                    </div>
                </div>
                <div id="visitDetailContent" class="p-4"></div>
            </div>
        </div>

        <!-- Add Person Modal -->
        <div id="personModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
            <div class="bg-white rounded-lg max-w-md w-full mx-4">
                <div class="p-4 border-b">
                    <h3 class="text-lg font-semibold">添加成员</h3>
                </div>
                <form id="personForm" class="p-4 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">姓名 *</label>
                        <input type="text" name="name" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">关系</label>
                        <select name="relationship" class="w-full border rounded-lg px-3 py-2">
                            <option value="self">本人</option>
                            <option value="spouse">配偶</option>
                            <option value="child">子女</option>
                            <option value="parent">父母</option>
                            <option value="sibling">兄弟姐妹</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">出生日期</label>
                        <input type="date" name="birth_date" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">性别</label>
                        <select name="gender" class="w-full border rounded-lg px-3 py-2">
                            <option value="">未知</option>
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>
                    <div class="flex justify-end gap-2">
                        <button type="button" onclick="closePersonModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Add Visit Modal -->
        <div id="visitModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
            <div class="bg-white rounded-lg max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="p-4 border-b">
                    <h3 class="text-lg font-semibold">添加就诊记录</h3>
                </div>
                <form id="visitForm" class="p-4 space-y-4">
                    <!-- 快速录入区域 -->
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                        <div class="flex items-center justify-between mb-2">
                            <h4 class="font-medium text-green-800">📷 快速录入</h4>
                            <span class="text-sm text-green-600">上传病历自动识别</span>
                        </div>
                        <div class="flex gap-2 items-start">
                            <input type="file" id="quickImportFiles" accept="image/*,.pdf" multiple class="flex-1 border rounded-lg px-3 py-2 text-sm">
                            <button type="button" onclick="quickImportFromForm()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm whitespace-nowrap">识别</button>
                        </div>
                        <div id="quickImportProgress" class="hidden mt-3">
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div id="progressBarFill" class="bg-green-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                            </div>
                            <div id="progressMessage" class="text-sm text-gray-600 mt-1"></div>
                        </div>
                        <div id="uploadedFiles" class="mt-2 text-sm text-gray-500"></div>
                    </div>

                    <hr class="my-2">

                    <!-- 表单字段 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">患者 *</label>
                            <select name="person_id" required id="visitPersonSelect" class="w-full border rounded-lg px-3 py-2"></select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">就诊日期 *</label>
                            <input type="date" name="visit_date" required class="w-full border rounded-lg px-3 py-2">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">医院</label>
                            <input type="text" name="hospital" class="w-full border rounded-lg px-3 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">科室</label>
                            <input type="text" name="department" class="w-full border rounded-lg px-3 py-2">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">医生</label>
                        <input type="text" name="doctor" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">主诉</label>
                        <textarea name="chief_complaint" rows="2" class="w-full border rounded-lg px-3 py-2"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">诊断</label>
                        <textarea name="diagnosis" rows="2" class="w-full border rounded-lg px-3 py-2"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">摘要</label>
                        <textarea name="summary" rows="2" class="w-full border rounded-lg px-3 py-2" placeholder="病历摘要"></textarea>
                    </div>

                    <!-- 隐藏字段：保存已上传的附件ID -->
                    <input type="hidden" id="uploadedAttachmentIds" value="">

                    <div class="flex justify-end gap-2 pt-2">
                        <button type="button" onclick="closeVisitModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Upload Modal -->
        <div id="uploadModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
            <div class="bg-white rounded-lg max-w-md w-full mx-4">
                <div class="p-4 border-b">
                    <h3 class="text-lg font-semibold">上传文件</h3>
                </div>
                <form id="uploadForm" class="p-4 space-y-4">
                    <input type="hidden" name="visit_id" id="uploadVisitId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">选择文件</label>
                        <input type="file" name="file" accept="image/*,.pdf" required class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div class="text-sm text-gray-500">支持图片和 PDF 文件</div>
                    <div class="flex justify-end gap-2">
                        <button type="button" onclick="closeUploadModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">上传</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Preview Modal -->
        <div id="previewModal" class="modal fixed inset-0 items-center justify-center z-50">
            <button class="close-btn" onclick="closePreview()">&times;</button>
            <div class="preview-filename" id="previewFilename"></div>
            <div class="preview-container" id="previewContainer" onclick="closePreview()">
                <img id="previewImage" src="" alt="预览" onclick="event.stopPropagation()">
                <iframe id="previewPdf" src="" style="display:none; width:90vw; height:85vh;" onclick="event.stopPropagation()"></iframe>
            </div>
            <div class="preview-toolbar" onclick="event.stopPropagation()">
                <button onclick="zoomOut()">➖ 缩小</button>
                <button onclick="resetZoom()">↺ 重置</button>
                <button onclick="zoomIn()">➕ 放大</button>
            </div>
        </div>

        <!-- Person Detail Modal -->
        <div id="personDetailModal" class="modal fixed inset-0 bg-black/50 items-center justify-center z-50">
            <div class="bg-white rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white z-10">
                    <h3 class="text-xl font-semibold" id="personDetailTitle">成员详情</h3>
                    <div class="flex items-center gap-2">
                        <button onclick="deletePerson(currentPersonData.id); closePersonDetail();" class="px-3 py-1 text-red-600 hover:text-red-800 text-sm">删除</button>
                        <button onclick="toggleEditMode()" id="editToggleBtn" class="px-3 py-1 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">编辑</button>
                        <button onclick="closePersonDetail()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                    </div>
                </div>
                <div id="personDetailContent" class="p-4"></div>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        let persons = [];
        let doctors = [];
        let currentVisitId = null;
        let uploadedAttachments = []; // 保存已上传的附件信息
        let selectedPersonId = null; // 当前选中的成员ID

        // ==================== API Calls ====================
        async function fetchAPI(url, options = {}) {
            const res = await fetch(API + url, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers }
            });
            if (!res.ok) throw new Error('API Error');
            // Handle empty responses (like 204 No Content)
            const text = await res.text();
            return text ? JSON.parse(text) : null;
        }

        // ==================== Load Data ====================
        async function loadPersons() {
            persons = await fetchAPI('/api/persons');

            // 排序：本人优先，其他按名字字母序
            persons.sort((a, b) => {
                if (a.relationship === 'self' && b.relationship !== 'self') return -1;
                if (a.relationship !== 'self' && b.relationship === 'self') return 1;
                return a.name.localeCompare(b.name, 'zh-CN');
            });

            // 设置默认选中：优先从 localStorage 恢复，否则选第一个
            const savedId = localStorage.getItem('selectedPersonId');
            if (savedId && persons.some(p => p.id === savedId)) {
                selectedPersonId = savedId;
            } else if (persons.length > 0) {
                selectedPersonId = persons[0].id;
            }

            renderPersons();
            updatePersonSelect();
            updateFilterSelects(); // Update filter dropdowns when visible
        }

        async function loadVisits(personId = null) {
            const url = personId ? `/api/visits?person_id=${personId}` : '/api/visits';
            const visits = await fetchAPI(url);
            renderVisits(visits);

            // Extract unique doctors from visits
            const doctorSet = new Set();
            visits.forEach(v => {
                if (v.doctor) {
                    doctorSet.add(v.doctor);
                }
            });
            doctors = Array.from(doctorSet).sort();

            updateFilterSelects(); // Update filter dropdowns when visible
        }

        // Update all filter dropdowns if the panel is visible
        function updateFilterSelects() {
            const panel = document.getElementById('filtersPanel');
            if (!panel.classList.contains('hidden')) {
                updateFilterPersonSelect();
                updateFilterDoctorSelect();
            }
        }

        // ==================== Render ====================
        function renderPersons() {
            const container = document.getElementById('personsList');
            if (persons.length === 0) {
                container.innerHTML = '<div class="p-4 text-gray-500 text-center">暂无成员</div>';
                return;
            }
            container.innerHTML = persons.map(p => `
                <div class="p-4 hover:bg-gray-50 cursor-pointer flex justify-between items-center ${selectedPersonId === p.id ? 'bg-blue-50 border-l-4 border-blue-500' : ''}"
                     onclick="selectPersonAndLoadVisits('${p.id}')">
                    <div class="flex-1">
                        <div class="font-medium ${selectedPersonId === p.id ? 'text-blue-700' : ''}">${escapeHtml(p.name)}</div>
                        <div class="text-sm text-gray-500">${formatRelationship(p.relationship)}</div>
                    </div>
                    <button onclick="event.stopPropagation(); showPersonDetail('${p.id}')" class="text-xs text-blue-500 hover:text-blue-700">
                        查看详情
                    </button>
                </div>
            `).join('');
        }

        function renderVisits(visits) {
            const container = document.getElementById('visitsList');
            if (visits.length === 0) {
                container.innerHTML = '<div class="p-8 text-gray-500 text-center">暂无就诊记录</div>';
                return;
            }
            container.innerHTML = visits.map(v => `
                <div class="p-4 hover:bg-gray-50 cursor-pointer" onclick="showVisitDetail('${v.id}')">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-medium">${v.hospital || '未知医院'} - ${v.department || '未知科室'}</div>
                            <div class="text-sm text-gray-500">${v.visit_date} · ${getPersonName(v.person_id)}</div>
                        </div>
                        ${v.diagnosis ? `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">${v.diagnosis}</span>` : ''}
                    </div>
                    ${v.chief_complaint ? `<div class="text-sm text-gray-600 mt-2">主诉: ${v.chief_complaint}</div>` : ''}
                    <div class="flex gap-2 mt-2">
                        ${v.attachments.map(a => `
                            <span class="text-xs ${a.has_extraction ? 'bg-green-100 text-green-800' : a.has_ocr ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-600'} px-2 py-1 rounded">
                                📎 ${a.original_filename || '附件'}
                            </span>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // ==================== Person Actions ====================
        function selectPersonAndLoadVisits(id) {
            selectedPersonId = id;
            localStorage.setItem('selectedPersonId', id);
            renderPersons();
            loadVisits(id);
        }

        function showPersonModal() {
            document.getElementById('personModal').classList.add('active');
            document.getElementById('personForm').reset();
        }

        function closePersonModal() {
            document.getElementById('personModal').classList.remove('active');
        }

        // ==================== Person Detail Modal ====================
        let currentPersonData = null;
        let isEditMode = false;

        async function showPersonDetail(id) {
            const person = persons.find(p => p.id === id);
            if (!person) return;

            currentPersonData = person;
            isEditMode = false;
            renderPersonDetail();
            document.getElementById('personDetailModal').classList.add('active');
        }

        function closePersonDetail() {
            document.getElementById('personDetailModal').classList.remove('active');
            currentPersonData = null;
            isEditMode = false;
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            renderPersonDetail();
        }

        function renderPersonDetail() {
            const p = currentPersonData;
            const title = document.getElementById('personDetailTitle');
            const content = document.getElementById('personDetailContent');
            const editBtn = document.getElementById('editToggleBtn');

            title.textContent = p.name;
            editBtn.textContent = isEditMode ? '取消' : '编辑';

            if (isEditMode) {
                content.innerHTML = renderEditForm(p);
            } else {
                content.innerHTML = renderDetailView(p);
            }
        }

        function renderDetailView(p) {
            return `
                <div class="space-y-6">
                    <!-- 基础信息卡片 -->
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h4 class="font-medium text-gray-900 mb-3 flex items-center gap-2">
                            <span class="text-lg">👤</span> 基础信息
                        </h4>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                            <div><span class="text-gray-500">关系：</span>${formatRelationship(p.relationship)}</div>
                            <div><span class="text-gray-500">性别：</span>${formatGender(p.gender)}</div>
                            <div><span class="text-gray-500">生日：</span>${p.birth_date || '-'}</div>
                            <div><span class="text-gray-500">血型：</span>${p.blood_type || '-'}</div>
                        </div>
                        ${p.allergies && p.allergies.length > 0 ? `
                            <div class="mt-3 pt-3 border-t border-gray-200">
                                <span class="text-gray-500 text-sm">过敏史：</span>
                                <div class="flex flex-wrap gap-2 mt-1">
                                    ${p.allergies.map(a => `<span class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded">${escapeHtml(a)}</span>`).join('')}
                                </div>
                            </div>
                        ` : ''}
                        ${p.notes ? `<div class="mt-3 pt-3 border-t border-gray-200 text-sm"><span class="text-gray-500">备注：</span>${escapeHtml(p.notes)}</div>` : ''}
                    </div>

                    <!-- 身体测量 -->
                    ${renderBodyMeasurements(p.body_measurements)}

                    <!-- 既往病史 -->
                    ${renderChronicDiseases(p.chronic_diseases)}
                    ${renderPastSurgeries(p.past_surgeries)}

        // ==================== Quick Import from Form ====================
        async function quickImportFromForm() {
            const fileInput = document.getElementById('quickImportFiles');
            const files = fileInput.files;

            if (!files || files.length === 0) {
                alert('请选择文件');
                return;
            }

            // Show progress
            document.getElementById('quickImportProgress').classList.remove('hidden');
            const updateProgress = (message, percent) => {
                document.getElementById('progressBarFill').style.width = percent + '%';
                document.getElementById('progressMessage').textContent = message;
            };
            updateProgress('上传文件中...', 5);

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }

            try {
                const res = await fetch(API + '/api/quick-import', {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) throw new Error('请求失败');

                // Read SSE stream
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let result = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const data = line.slice(5).trim();
                            if (!data) continue;

                            try {
                                const event = JSON.parse(data);

                                if (event.stage === 'error') {
                                    throw new Error(event.message);
                                } else if (event.attachment_ids || event.visit_date || event.hospital || event.diagnosis || event.ocr_text) {
                                    // Final result (flattened from ProgressComplete)
                                    result = event;
                                    if (event.attachment_ids) {
                                        uploadedAttachments = event.attachment_ids;
                                    }
                                } else if (event.stage === 'complete') {
                                    // Progress complete event, ignore
                                } else {
                                    // Progress update
                                    updateProgress(event.message, event.progress);
                                }
                            } catch (parseErr) {
                                console.log('SSE parse error:', parseErr, data);
                            }
                        }
                    }
                }

                if (result) {
                    updateProgress('识别完成！', 100);
                    prefillVisitForm(result);
                    updateUploadedFilesList(files);
                } else {
                    throw new Error('未收到识别结果');
                }

            } catch (err) {
                alert('识别失败: ' + err.message);
                document.getElementById('quickImportProgress').classList.add('hidden');
            }
        }

            editBtn.textContent = isVisitEditMode ? '取消' : '编辑';

            if (isVisitEditMode) {
                document.getElementById('visitDetailContent').innerHTML = renderVisitEditForm(visit);
            } else {
                document.getElementById('visitDetailContent').innerHTML = renderVisitDetailView(visit);
            }
        }

        function renderVisitDetailView(visit) {
            var html = '<div class="space-y-4">' +
                '<div class="grid grid-cols-2 gap-4">' +
                '<div><span class="text-gray-500">患者:</span> ' + getPersonName(visit.person_id) + '</div>' +
                '<div><span class="text-gray-500">科室:</span> ' + (visit.department || '-') + '</div>' +
                '<div><span class="text-gray-500">医生:</span> ' + (visit.doctor || '-') + '</div>' +
                '<div><span class="text-gray-500">日期:</span> ' + visit.visit_date + '</div>' +
                '</div>';

            if (visit.chief_complaint) html += '<div><span class="text-gray-500">主诉:</span> ' + escapeHtml(visit.chief_complaint) + '</div>';
            if (visit.diagnosis) html += '<div><span class="text-gray-500">诊断:</span> <span class="font-medium">' + escapeHtml(visit.diagnosis) + '</span></div>';
            if (visit.summary) html += '<div><span class="text-gray-500">摘要:</span> ' + escapeHtml(visit.summary) + '</div>';
            if (visit.treatment) html += '<div><span class="text-gray-500">治疗:</span> ' + escapeHtml(visit.treatment) + '</div>';
            if (visit.notes) html += '<div><span class="text-gray-500">备注:</span> ' + escapeHtml(visit.notes) + '</div>';

            html += '<div class="border-t pt-4">' +
                '<div class="flex justify-between items-center mb-3">' +
                '<h4 class="font-medium">附件 (' + visit.attachments.length + ')</h4>' +
                '<button onclick="showUploadModal(\'' + visit.id + '\')" class="text-blue-600 hover:text-blue-800 text-sm">+ 上传</button>' +
                '</div><div class="space-y-2">';

            visit.attachments.forEach(function(a) {
                var previewable = isPreviewable(a.mime_type);
                html += '<div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">' +
                    '<div class="flex items-center gap-3 cursor-pointer" onclick="' + (previewable ? 'openPreview(\'' + a.file_path + '\', \'' + (a.original_filename || '附件') + '\', \'' + a.mime_type + '\')' : '') + '">' +
                    '<span class="text-2xl">' + getFileIcon(a.mime_type) + '</span>' +
                    '<div>' +
                    '<div class="font-medium ' + (previewable ? 'text-blue-600 hover:underline' : '') + '">' + (a.original_filename || '附件') + '</div>' +
                    '<div class="text-sm text-gray-500">' + formatBytes(a.file_size) + '</div>' +
                    '</div></div>' +
                    '<div class="flex gap-2">' +
                    (a.has_extraction ? '<button onclick="viewExtraction(\'' + a.id + '\')" class="px-3 py-1 bg-blue-100 text-blue-800 rounded text-sm hover:bg-blue-200">查看</button>' : '') +
                    '<a href="/data/' + a.file_path + '" target="_blank" class="px-3 py-1 bg-gray-100 text-gray-800 rounded text-sm hover:bg-gray-200">文件</a>' +
                    '</div></div>';
            });

            if (visit.attachments.length === 0) {
                html += '<div class="text-gray-500 text-center py-4">暂无附件</div>';
            }

            html += '</div></div>' +
                '<div class="flex justify-end pt-4 border-t">' +
                '<button onclick="deleteVisit(\'' + visit.id + '\')" class="px-4 py-2 text-red-600 hover:text-red-800">删除记录</button>' +
                '</div></div>';

            return html;
        }

        function renderVisitEditForm(visit) {
            return '<form id="editVisitForm" class="space-y-4">' +
                '<div class="grid grid-cols-2 gap-4">' +
                '<div><label class="block text-sm font-medium text-gray-700 mb-1">医院</label>' +
                '<input type="text" name="hospital" value="' + escapeHtml(visit.hospital || '') + '" class="w-full border rounded-lg px-3 py-2"></div>' +
                '<div><label class="block text-sm font-medium text-gray-700 mb-1">科室</label>' +
                '<input type="text" name="department" value="' + escapeHtml(visit.department || '') + '" class="w-full border rounded-lg px-3 py-2"></div>' +
                '<div><label class="block text-sm font-medium text-gray-700 mb-1">医生</label>' +
                '<input type="text" name="doctor" value="' + escapeHtml(visit.doctor || '') + '" class="w-full border rounded-lg px-3 py-2"></div>' +
                '</div>' +
                '<div><label class="block text-sm font-medium text-gray-700 mb-1">主诉</label>' +
                '<textarea name="chief_complaint" rows="2" class="w-full border rounded-lg px-3 py-2">' + escapeHtml(visit.chief_complaint || '') + '</textarea></div>' +
                '<div><label class="block text-sm font-medium text-gray-700 mb-1">诊断</label>' +
                '<textarea name="diagnosis" rows="2" class="w-full border rounded-lg px-3 py-2">' + escapeHtml(visit.diagnosis || '') + '</textarea></div>' +
                '<div><label class="block text-sm font-medium text-gray-700 mb-1">治疗方案</label>' +
                '<textarea name="treatment" rows="2" class="w-full border rounded-lg px-3 py-2">' + escapeHtml(visit.treatment || '') + '</textarea></div>' +
                '<div><label class="block text-sm font-medium text-gray-700 mb-1">摘要</label>' +
                '<textarea name="summary" rows="2" class="w-full border rounded-lg px-3 py-2">' + escapeHtml(visit.summary || '') + '</textarea></div>' +
                '<div><label class="block text-sm font-medium text-gray-700 mb-1">备注</label>' +
                '<textarea name="notes" rows="2" class="w-full border rounded-lg px-3 py-2">' + escapeHtml(visit.notes || '') + '</textarea></div>' +
                '<div class="flex justify-end gap-2 pt-4 border-t">' +
                '<button type="button" onclick="toggleVisitEditMode()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">取消</button>' +
                '<button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">保存</button>' +
                '</div></form>';
        }

        function toggleVisitEditMode() {
            isVisitEditMode = !isVisitEditMode;
            renderVisitDetail();
        }

        // Handle edit visit form submission
        document.addEventListener('submit', async function(e) {
            if (e.target.id !== 'editVisitForm') return;
            e.preventDefault();

            const form = e.target;
            const data = {
                hospital: form.hospital.value,
                department: form.department.value,
                doctor: form.doctor.value,
                chief_complaint: form.chief_complaint.value,
                diagnosis: form.diagnosis.value,
                treatment: form.treatment.value,
                summary: form.summary.value,
                notes: form.notes.value
            };

            try {
                const updated = await fetchAPI('/api/visits/' + currentVisitId, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                currentVisitData = updated;
                isVisitEditMode = false;
                renderVisitDetail();
                loadVisits(selectedPersonId);
            } catch (err) {
                alert('保存失败: ' + err.message);
            }
        });

        function closeVisitDetail() {
            document.getElementById('visitDetailModal').classList.remove('active');
            currentVisitData = null;
            isVisitEditMode = false;
        }

        async function deleteVisit(id) {
            if (!confirm('确定删除该就诊记录？')) return;
            try {
                await fetchAPI(`/api/visits/${id}`, { method: 'DELETE' });
            } catch (e) {
                console.error('删除失败:', e);
            }
            closeVisitDetail();
            loadVisits();
        }

        // ==================== Upload ====================
        function showUploadModal(visitId) {
            document.getElementById('uploadVisitId').value = visitId;
            document.getElementById('uploadModal').classList.add('active');
        }

        function closeUploadModal() {
            document.getElementById('uploadModal').classList.remove('active');
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const visitId = document.getElementById('uploadVisitId').value;
            const file = form.file.files[0];

            const formData = new FormData();
            formData.append('file', file);

            const res = await fetch(API + `/api/visits/${visitId}/attachments`, {
                method: 'POST',
                body: formData
            });

            if (res.ok) {
                closeUploadModal();
                showVisitDetail(visitId);
            } else {
                alert('上传失败');
            }
        });

        // ==================== OCR & Extraction ====================
        async function runOcr(attachmentId) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '处理中...';

            try {
                await fetchAPI(`/api/attachments/${attachmentId}/ocr`, { method: 'POST' });
                showVisitDetail(currentVisitId);
            } catch (e) {
                alert('OCR 处理失败: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'OCR';
            }
        }

        async function viewOcr(attachmentId) {
            const result = await fetchAPI(`/api/attachments/${attachmentId}/ocr`);
            alert('OCR 结果:\n\n' + result.recognized_text);
        }

        async function runExtract(attachmentId) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '提取中...';

            try {
                const result = await fetchAPI(`/api/attachments/${attachmentId}/extract`, { method: 'POST' });
                showVisitDetail(currentVisitId);
            } catch (e) {
                alert('提取失败: ' + e.message);
                btn.disabled = false;
                btn.textContent = '提取';
            }
        }

        // ==================== Extraction Modal ====================
        let currentExtractionData = null;
        let currentExtractionAttachmentId = null;

        async function viewExtraction(attachmentId) {
            currentExtractionAttachmentId = attachmentId;
            const result = await fetchAPI(`/api/attachments/${attachmentId}/extract`);
            currentExtractionData = result;

            // Build content with cards
            let html = '<div class="space-y-4">';

            // Diagnosis card
            if (result.diagnosis) {
                html += '<div class="bg-red-50 border border-red-200 rounded-lg p-4">' +
                    '<h4 class="font-medium text-red-800 mb-2 flex items-center gap-2">' +
                    '<span>🔍</span> 诊断</h4>' +
                    '<p class="text-gray-800">' + escapeHtml(result.diagnosis) + '</p></div>';
            }

            // Chief complaint card
            if (result.chief_complaint) {
                html += '<div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">' +
                    '<h4 class="font-medium text-yellow-800 mb-2 flex items-center gap-2">' +
                    '<span>💬</span> 主诉</h4>' +
                    '<p class="text-gray-800">' + escapeHtml(result.chief_complaint) + '</p></div>';
            }

            // Treatment card
            if (result.treatment) {
                html += '<div class="bg-green-50 border border-green-200 rounded-lg p-4">' +
                    '<h4 class="font-medium text-green-800 mb-2 flex items-center gap-2">' +
                    '<span>💊</span> 治疗方案</h4>' +
                    '<p class="text-gray-800">' + escapeHtml(result.treatment) + '</p></div>';
            }

            // Medications card
            if (result.medications && result.medications.length > 0) {
                html += '<div class="bg-blue-50 border border-blue-200 rounded-lg p-4">' +
                    '<h4 class="font-medium text-blue-800 mb-2 flex items-center gap-2">' +
                    '<span>💉</span> 处方药物</h4><div class="space-y-2">';
                result.medications.forEach(function(m) {
                    html += '<div class="flex items-center gap-2 text-sm bg-white rounded p-2">' +
                        '<span class="font-medium text-gray-900">' + escapeHtml(m.name) + '</span>' +
                        (m.dosage ? '<span class="text-gray-500">' + escapeHtml(m.dosage) + '</span>' : '') +
                        (m.frequency ? '<span class="text-gray-400">' + escapeHtml(m.frequency) + '</span>' : '') +
                        (m.duration ? '<span class="text-gray-400">(' + escapeHtml(m.duration) + ')</span>' : '') +
                        '</div>';
                });
                html += '</div></div>';
            }

            // Follow up card
            if (result.follow_up) {
                html += '<div class="bg-purple-50 border border-purple-200 rounded-lg p-4">' +
                    '<h4 class="font-medium text-purple-800 mb-2 flex items-center gap-2">' +
                    '<span>📅</span> 复诊建议</h4>' +
                    '<p class="text-gray-800">' + escapeHtml(result.follow_up) + '</p></div>';
            }

            // Summary card
            if (result.summary) {
                html += '<div class="bg-gray-50 border border-gray-200 rounded-lg p-4">' +
                    '<h4 class="font-medium text-gray-800 mb-2 flex items-center gap-2">' +
                    '<span>📝</span> 摘要</h4>' +
                    '<p class="text-gray-700">' + escapeHtml(result.summary) + '</p></div>';
            }

            html += '</div>';

            document.getElementById('extractionModalContent').innerHTML = html;
            document.getElementById('extractionModal').classList.add('active');
        }

        function closeExtractionModal() {
            document.getElementById('extractionModal').classList.remove('active');
            currentExtractionData = null;
        }

        async function applyExtractionToVisit() {
            if (!currentExtractionData || !currentVisitId) {
                alert('无法应用：缺少数据');
                return;
            }

            var data = {};
            if (currentExtractionData.chief_complaint) data.chief_complaint = currentExtractionData.chief_complaint;
            if (currentExtractionData.diagnosis) data.diagnosis = currentExtractionData.diagnosis;
            if (currentExtractionData.treatment) data.treatment = currentExtractionData.treatment;
            if (currentExtractionData.summary) data.summary = currentExtractionData.summary;

            if (Object.keys(data).length === 0) {
                alert('没有可应用的数据');
                return;
            }

            try {
                await fetchAPI('/api/visits/' + currentVisitId, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                closeExtractionModal();
                showVisitDetail(currentVisitId);
            } catch (err) {
                alert('应用失败: ' + err.message);
            }
        }

        // ==================== Search ====================
        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            const personId = document.getElementById('filterPerson').value;
            const hospital = document.getElementById('filterHospital').value.trim();
            const doctor = document.getElementById('filterDoctor').value;

            // Build query string
            const params = new URLSearchParams();
            if (query) params.append('q', query);
            if (personId) params.append('person_id', personId);
            if (hospital) params.append('hospital', hospital);
            if (doctor) params.append('doctor', doctor);

            const queryString = params.toString();
            if (!queryString) {
                loadVisits();
                return;
            }

            const results = await fetchAPI(`/api/search?${queryString}`);
            renderVisits(results);
        }

        function toggleFilters() {
            const panel = document.getElementById('filtersPanel');
            const text = document.getElementById('filterToggleText');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                text.textContent = '隐藏筛选';
                updateFilterPersonSelect();
                updateFilterDoctorSelect();
            } else {
                panel.classList.add('hidden');
                text.textContent = '高级筛选';
            }
        }

        function updateFilterPersonSelect() {
            const select = document.getElementById('filterPerson');
            select.innerHTML = '<option value="">全部成员</option>';
            persons.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.name;
                select.appendChild(option);
            });
        }

        function updateFilterDoctorSelect() {
            const select = document.getElementById('filterDoctor');
            select.innerHTML = '<option value="">全部医生</option>';
            doctors.forEach(d => {
                const option = document.createElement('option');
                option.value = d;
                option.textContent = d;
                select.appendChild(option);
            });
        }

        // Clear filters
        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterPerson').value = '';
            document.getElementById('filterHospital').value = '';
            document.getElementById('filterDoctor').value = '';
            loadVisits();
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });

        // ==================== Helpers ====================
        function getPersonName(id) {
            const p = persons.find(p => p.id === id);
            return p ? p.name : '未知';
        }

        function formatRelationship(r) {
            const map = { self: '本人', spouse: '配偶', child: '子女', parent: '父母', sibling: '兄弟姐妹', other: '其他' };
            return map[r] || r;
        }

        function formatGender(g) {
            const map = { male: '男', female: '女', other: '其他' };
            return map[g] || '未知';
        }

        function formatDiseaseStatus(s) {
            const map = { active: '活动期', controlled: '控制中', remission: '缓解期' };
            return map[s] || s || '未知';
        }

        function formatSmoking(s) {
            const map = { never: '从不', former: '已戒烟', current: '吸烟' };
            return map[s] || '未知';
        }

        function formatDrinking(d) {
            const map = { never: '从不', occasional: '偶尔', regular: '经常', former: '已戒酒' };
            return map[d] || '未知';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatBytes(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        function getFileIcon(mime) {
            if (!mime) return '📄';
            if (mime.startsWith('image/')) return '🖼️';
            if (mime === 'application/pdf') return '📑';
            return '📄';
        }

        // 判断文件是否可预览
        function isPreviewable(mime) {
            if (!mime) return false;
            // 支持常见图片格式和 PDF
            const supportedImages = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'image/svg+xml', 'image/bmp', 'image/x-bmp', 'image/avif', 'image/ico', 'image/x-icon'];
            if (supportedImages.includes(mime.toLowerCase())) return true;
            if (mime === 'application/pdf') return true;
            return false;
        }

        // 预览相关变量
        let currentZoom = 100;
        const minZoom = 25;
        const maxZoom = 400;

        function openPreview(filePath, filename, mimeType) {
            const modal = document.getElementById('previewModal');
            const img = document.getElementById('previewImage');
            const pdf = document.getElementById('previewPdf');

            document.getElementById('previewFilename').textContent = filename;
            currentZoom = 100;

            if (mimeType === 'application/pdf') {
                img.style.display = 'none';
                pdf.style.display = 'block';
                pdf.src = `/data/${filePath}`;
            } else {
                pdf.style.display = 'none';
                img.style.display = 'block';
                img.src = `/data/${filePath}`;
                img.style.transform = 'scale(1)';
            }

            modal.classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
            document.getElementById('previewImage').src = '';
            document.getElementById('previewPdf').src = '';
        }

        function updateZoom() {
            const img = document.getElementById('previewImage');
            img.style.transform = `scale(${currentZoom / 100})`;
        }

        function zoomIn() {
            if (currentZoom < maxZoom) {
                currentZoom += 25;
                updateZoom();
            }
        }

        function zoomOut() {
            if (currentZoom > minZoom) {
                currentZoom -= 25;
                updateZoom();
            }
        }

        function resetZoom() {
            currentZoom = 100;
            updateZoom();
        }

        // 键盘和滚轮事件
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('previewModal');
            if (!modal.classList.contains('active')) return;

            if (e.key === 'Escape') closePreview();
            if (e.key === '+' || e.key === '=') zoomIn();
            if (e.key === '-') zoomOut();
            if (e.key === '0') resetZoom();
        });

        document.getElementById('previewModal').addEventListener('wheel', (e) => {
            const modal = document.getElementById('previewModal');
            if (!modal.classList.contains('active')) return;

            // 只对图片缩放，PDF 使用浏览器自带缩放
            const img = document.getElementById('previewImage');
            if (img.style.display === 'none') return;

            e.preventDefault();
            if (e.deltaY < 0) {
                zoomIn();
            } else {
                zoomOut();
            }
        });

        function filterByPerson(id) {
            selectedPersonId = id;
            localStorage.setItem('selectedPersonId', id);
            renderPersons();
            loadVisits(id);
        }

        // ==================== Init ====================
        async function init() {
            await loadPersons();
            if (selectedPersonId) {
                loadVisits(selectedPersonId);
            }
        }
        init();
    </script>
</body>
</html>
