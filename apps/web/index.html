<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthKeeper - 医疗档案管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS 变量定义主题色 */
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --primary-light: #93c5fd;
            --bg-main: #f8fafc;
            --card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        /* 基础样式 */
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Modal 基础样式 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }

        /* Modal 遮罩层 */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        /* Modal 内容卡片 */
        .modal-content {
            position: relative;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.2s ease-out;
        }
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Modal 标题栏 */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
        }
        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            color: #64748b;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .modal-close:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        /* Modal 表单区 */
        .modal-body {
            padding: 20px;
        }

        /* Modal 底部操作栏 */
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            background: #f8fafc;
            border-radius: 0 0 16px 16px;
        }

        /* Modal 底部上滑面板 */
        .modal-bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 24px 20px;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.1);
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 100;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-bottom-sheet.active {
            transform: translateY(0);
        }

        /* 选择按钮组 */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .btn-group-item {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .btn-group-item:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .btn-group-item.active {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        /* 表单标签 */
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        /* 表单输入框 */
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            color: #1e293b;
            transition: all 0.15s ease;
            outline: none;
        }
        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-input::placeholder {
            color: #94a3b8;
        }

        /* 表单组 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }

        /* 按钮样式 */
        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }
        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }

        /* Timeline styles */
        .timeline-container {
            position: relative;
            padding-left: 40px;
        }
        .timeline-line {
            position: absolute;
            left: 14px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #3b82f6, #93c5fd, #e2e8f0);
        }
        .timeline-item {
            position: relative;
            padding-bottom: 16px;
        }
        .timeline-item:last-child {
            padding-bottom: 0;
        }
        .timeline-dot {
            position: absolute;
            left: -32px;
            top: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e2e8f0;
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px #e2e8f0;
        }
        .timeline-dot.today {
            background: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.2); }
        }
        .timeline-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .timeline-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
            transform: translateX(4px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="app" class="max-w-7xl mx-auto px-4 py-8">
        <!-- Greeting Section -->
        <div id="greetingSection" class="rounded-2xl p-6 mb-6 text-white" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">
            <div class="flex justify-between items-start">
                <div>
                    <p id="greetingTime" class="text-lg opacity-90">早上好</p>
                    <h1 id="greetingName" class="text-2xl font-bold mt-1">用户</h1>
                    <p id="greetingTip" class="text-sm opacity-80 mt-2">今天也要注意身体健康哦</p>
                </div>
                <button id="notificationBtn" class="p-2 rounded-full bg-white/20 hover:bg-white/30 transition-colors" title="通知">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <!-- 快速录入 - 突出显示 -->
            <button onclick="showVisitModal()" class="bg-white rounded-xl p-4 shadow-sm border-2 border-blue-500 hover:shadow-md transition-all group">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white group-hover:scale-110 transition-transform">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                    </div>
                    <div class="text-left">
                        <div class="font-semibold text-gray-900">快速录入</div>
                        <div class="text-xs text-gray-500">上传病历自动识别</div>
                    </div>
                </div>
            </button>

            <!-- 搜索记录 -->
            <button onclick="focusSearch()" class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 hover:shadow-md hover:border-blue-300 transition-all group">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <div class="text-left">
                        <div class="font-semibold text-gray-900">搜索记录</div>
                        <div class="text-xs text-gray-500">查找历史病历</div>
                    </div>
                </div>
            </button>

            <!-- 家庭成员 -->
            <button onclick="document.getElementById('personsList').scrollIntoView({behavior: 'smooth'})" class="bg-white rounded-xl p-4 shadow-sm border border-gray-200 hover:shadow-md hover:border-blue-300 transition-all group">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </div>
                    <div class="text-left">
                        <div class="font-semibold text-gray-900">家庭成员</div>
                        <div class="text-xs text-gray-500"><span id="memberCount">0</span> 位成员</div>
                    </div>
                </div>
            </button>
        </div>

        <!-- Family Members Overview -->
        <div class="bg-white rounded-xl shadow-sm mb-6">
            <div class="p-4 flex justify-between items-center border-b border-gray-100">
                <h2 class="text-lg font-semibold text-gray-900">家庭成员</h2>
                <button onclick="showPersonModal()" class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    添加成员
                </button>
            </div>
            <div id="personsList" class="p-4 overflow-x-auto">
                <!-- 成员卡片将通过 renderPersons() 渲染 -->
            </div>
        </div>

        <!-- Search Bar -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex gap-4 mb-4">
                <input type="text" id="searchInput" placeholder="搜索病历、诊断、药物..."
                    class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="search()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    搜索
                </button>
                <button onclick="toggleFilters()" class="border px-4 py-2 rounded-lg hover:bg-gray-50">
                    <span id="filterToggleText">高级筛选</span>
                </button>
            </div>
            <!-- Filters -->
            <div id="filtersPanel" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 pt-4 border-t">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">成员</label>
                    <select id="filterPerson" class="w-full border rounded-lg px-3 py-2">
                        <option value="">全部成员</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">医院</label>
                    <input type="text" id="filterHospital" placeholder="输入医院名称" class="w-full border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">医生</label>
                    <select id="filterDoctor" class="w-full border rounded-lg px-3 py-2">
                        <option value="">全部医生</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="grid grid-cols-1 gap-6">
            <!-- Visits Panel -->
            <div class="bg-white rounded-xl shadow-sm">
                <div class="p-4 border-b border-gray-100">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-lg font-semibold text-gray-900">最近就诊</h2>
                        <button onclick="showVisitModal()" class="text-blue-600 hover:text-blue-800 font-medium text-sm flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            添加记录
                        </button>
                    </div>
                    <!-- Member filter tabs -->
                    <div id="visitFilterTabs" class="flex gap-2 flex-wrap">
                        <!-- Tabs will be rendered by renderVisitFilterTabs() -->
                    </div>
                </div>
                <div id="visitsList" class="p-4 max-h-[600px] overflow-y-auto"></div>
            </div>
        </div>

        <!-- Extraction Result Modal -->
        <div id="extractionModal" class="modal">
            <div class="modal-overlay" onclick="closeExtractionModal()"></div>
            <div class="modal-content w-full max-w-2xl mx-4">
                <div class="modal-header">
                    <h3 id="extractionModalTitle">AI 提取结果</h3>
                    <button class="modal-close" onclick="closeExtractionModal()">&times;</button>
                </div>
                <div id="extractionModalContent" class="modal-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" onclick="closeExtractionModal()">关闭</button>
                    <button class="btn btn-primary" onclick="applyExtractionToVisit()">应用到记录</button>
                </div>
            </div>
        </div>

        <!-- Visit Detail Modal -->
        <div id="visitDetailModal" class="modal">
            <div class="modal-overlay" onclick="closeVisitDetail()"></div>
            <div class="modal-content w-full max-w-4xl mx-4">
                <div class="modal-header">
                    <h3 id="visitDetailTitle">就诊详情</h3>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleVisitEditMode()" id="visitEditBtn" class="btn btn-primary text-sm py-1.5 px-3">编辑</button>
                        <button class="modal-close" onclick="closeVisitDetail()">&times;</button>
                    </div>
                </div>
                <div id="visitDetailContent" class="modal-body"></div>
            </div>
        </div>

        <!-- Add Person Modal -->
        <div id="personModal" class="modal">
            <div class="modal-overlay" onclick="closePersonModal()"></div>
            <div class="modal-content w-full max-w-md mx-4">
                <div class="modal-header">
                    <h3>添加成员</h3>
                    <button class="modal-close" onclick="closePersonModal()">&times;</button>
                </div>
                <form id="personForm" class="modal-body">
                    <div class="form-group">
                        <label class="form-label">姓名 *</label>
                        <input type="text" name="name" required class="form-input" placeholder="请输入姓名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">关系</label>
                        <div class="btn-group" id="relationBtnGroup">
                            <button type="button" class="btn-group-item active" onclick="selectRelation(this, 'self')">本人</button>
                            <button type="button" class="btn-group-item" onclick="selectRelation(this, 'spouse')">配偶</button>
                            <button type="button" class="btn-group-item" onclick="selectRelation(this, 'child')">子女</button>
                            <button type="button" class="btn-group-item" onclick="selectRelation(this, 'parent')">父母</button>
                            <button type="button" class="btn-group-item" onclick="selectRelation(this, 'sibling')">兄弟姐妹</button>
                            <button type="button" class="btn-group-item" onclick="selectRelation(this, 'other')">其他</button>
                        </div>
                        <input type="hidden" name="relationship" value="self">
                    </div>
                    <div class="form-group">
                        <label class="form-label">出生日期</label>
                        <input type="date" name="birth_date" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">性别</label>
                        <div class="btn-group" id="genderBtnGroup">
                            <button type="button" class="btn-group-item" onclick="selectGender(this, 'male')">男</button>
                            <button type="button" class="btn-group-item" onclick="selectGender(this, 'female')">女</button>
                            <button type="button" class="btn-group-item active" onclick="selectGender(this, '')">未知</button>
                        </div>
                        <input type="hidden" name="gender" value="">
                    </div>
                </form>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closePersonModal()">取消</button>
                    <button type="submit" form="personForm" class="btn btn-primary">保存</button>
                </div>
            </div>
        </div>

        <!-- Add Visit Modal -->
        <div id="visitModal" class="modal">
            <div class="modal-overlay" onclick="closeVisitModal()"></div>
            <div class="modal-content w-full max-w-2xl mx-4">
                <div class="modal-header">
                    <h3>添加就诊记录</h3>
                    <button class="modal-close" onclick="closeVisitModal()">&times;</button>
                </div>
                <form id="visitForm" class="modal-body">
                    <!-- 快速录入区域 -->
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4 mb-4">
                        <div class="flex items-center justify-between mb-2">
                            <h4 class="font-medium text-green-800">📷 快速录入</h4>
                            <span class="text-sm text-green-600">上传病历自动识别</span>
                        </div>
                        <div class="flex gap-2 items-start">
                            <input type="file" id="quickImportFiles" accept="image/*,.pdf" multiple class="flex-1 border rounded-lg px-3 py-2 text-sm">
                            <button type="button" onclick="quickImportFromForm()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm whitespace-nowrap">识别</button>
                        </div>
                        <div class="flex items-center gap-2 mt-2">
                            <input type="checkbox" id="archiveOnly" class="rounded border-gray-300">
                            <label for="archiveOnly" class="text-sm text-gray-600">仅归档（跳过识别，创建"待整理"记录）</label>
                        </div>
                        <div id="quickImportProgress" class="hidden mt-3">
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div id="progressBarFill" class="bg-green-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                            </div>
                            <div id="progressMessage" class="text-sm text-gray-600 mt-1"></div>
                        </div>
                        <div id="uploadedFiles" class="mt-2 text-sm text-gray-500"></div>
                    </div>

                    <hr class="my-4">

                    <!-- 表单字段 -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">患者 *</label>
                            <select name="person_id" required id="visitPersonSelect" class="form-input"></select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">就诊日期 *</label>
                            <input type="date" name="visit_date" required class="form-input">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">医院</label>
                            <input type="text" name="hospital" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label">科室</label>
                            <input type="text" name="department" class="form-input">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">医生</label>
                        <input type="text" name="doctor" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">主诉</label>
                        <textarea name="chief_complaint" rows="2" class="form-input"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">诊断</label>
                        <textarea name="diagnosis" rows="2" class="form-input"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">摘要</label>
                        <textarea name="summary" rows="2" class="form-input" placeholder="病历摘要"></textarea>
                    </div>

                    <!-- 隐藏字段：保存已上传的附件ID -->
                    <input type="hidden" id="uploadedAttachmentIds" value="">
                </form>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeVisitModal()">取消</button>
                    <button type="submit" form="visitForm" class="btn btn-primary">保存</button>
                </div>
            </div>
        </div>

        <!-- Upload Modal -->
        <div id="uploadModal" class="modal">
            <div class="modal-overlay" onclick="closeUploadModal()"></div>
            <div class="modal-content w-full max-w-md mx-4">
                <div class="modal-header">
                    <h3>上传文件</h3>
                    <button class="modal-close" onclick="closeUploadModal()">&times;</button>
                </div>
                <form id="uploadForm" class="modal-body">
                    <input type="hidden" name="visit_id" id="uploadVisitId">
                    <div class="form-group">
                        <label class="form-label">选择文件</label>
                        <input type="file" name="file" accept="image/*,.pdf" required class="form-input">
                    </div>
                    <div class="flex items-center gap-2 mb-4">
                        <input type="checkbox" id="uploadArchiveOnly" class="rounded border-gray-300">
                        <label for="uploadArchiveOnly" class="text-sm text-gray-600">仅归档（跳过识别）</label>
                    </div>
                    <p class="text-sm text-gray-500">支持图片和 PDF 文件</p>
                </form>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeUploadModal()">取消</button>
                    <button type="submit" form="uploadForm" class="btn btn-primary">上传</button>
                </div>
            </div>
        </div>

        <!-- Preview Modal -->
        <div id="previewModal" class="modal" style="background: rgba(0,0,0,0.9);">
            <button class="close-btn" onclick="closePreview()" style="position: absolute; top: 20px; right: 20px; color: white; font-size: 32px; cursor: pointer; background: none; border: none; z-index: 10;">&times;</button>
            <div class="preview-filename" id="previewFilename" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 4px; font-size: 14px;"></div>
            <div class="preview-container" id="previewContainer" onclick="closePreview()" style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; position: relative;">
                <img id="previewImage" src="" alt="预览" onclick="event.stopPropagation()" style="max-width: 90vw; max-height: 85vh; transition: transform 0.2s ease;">
                <iframe id="previewPdf" src="" style="display:none; width:90vw; height:85vh;" onclick="event.stopPropagation()"></iframe>
            </div>
            <div class="preview-toolbar" onclick="event.stopPropagation()" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 8px;">
                <button onclick="zoomOut()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px;">➖ 缩小</button>
                <button onclick="resetZoom()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px;">↺ 重置</button>
                <button onclick="zoomIn()" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px;">➕ 放大</button>
            </div>
        </div>

        <!-- Person Detail Modal -->
        <div id="personDetailModal" class="modal">
            <div class="modal-overlay" onclick="closePersonDetail()"></div>
            <div class="modal-content w-full max-w-4xl mx-4 p-0 overflow-hidden">
                <!-- 渐变背景头部 -->
                <div class="relative bg-gradient-to-br from-blue-500 to-blue-700 px-6 py-8 text-white">
                    <!-- 操作按钮 -->
                    <div class="absolute top-4 right-4 flex items-center gap-2">
                        <button onclick="deletePerson(currentPersonData.id); closePersonDetail();" class="bg-white/20 hover:bg-white/30 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition-colors">
                            删除
                        </button>
                        <button onclick="toggleEditMode()" id="editToggleBtn" class="bg-white hover:bg-gray-100 text-blue-600 text-sm font-medium px-3 py-1.5 rounded-lg transition-colors">
                            编辑
                        </button>
                        <button class="w-8 h-8 flex items-center justify-center bg-white/20 hover:bg-white/30 rounded-lg transition-colors" onclick="closePersonDetail()">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>

                    <!-- 头像 -->
                    <div class="flex items-center gap-4">
                        <div class="w-20 h-20 bg-white/20 rounded-full flex items-center justify-center text-3xl font-bold backdrop-blur-sm border-2 border-white/30">
                            <span id="personAvatarInitial">?</span>
                        </div>
                        <div>
                            <h2 id="personDetailName" class="text-2xl font-bold"></h2>
                            <div id="personBasicInfo" class="text-blue-100 text-sm mt-1 flex items-center gap-3"></div>
                        </div>
                    </div>

                    <!-- 标签 -->
                    <div id="personTags" class="flex flex-wrap gap-2 mt-4"></div>
                </div>

                <!-- 内容区域 -->
                <div id="personDetailContent" class="p-6 max-h-[60vh] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        let persons = [];
        let doctors = [];
        let currentVisitId = null;
        let uploadedAttachments = []; // 保存已上传的附件信息
        let selectedPersonId = null; // 当前选中的成员ID

        // ==================== API Calls ====================
        async function fetchAPI(url, options = {}) {
            const res = await fetch(API + url, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers }
            });
            if (!res.ok) throw new Error('API Error');
            // Handle empty responses (like 204 No Content)
            const text = await res.text();
            return text ? JSON.parse(text) : null;
        }

        // ==================== Load Data ====================
        async function loadPersons() {
            persons = await fetchAPI('/api/persons');

            // 排序：本人优先，其他按名字字母序
            persons.sort((a, b) => {
                if (a.relationship === 'self' && b.relationship !== 'self') return -1;
                if (a.relationship !== 'self' && b.relationship === 'self') return 1;
                return a.name.localeCompare(b.name, 'zh-CN');
            });

            // 设置默认选中：优先从 localStorage 恢复
            const savedId = localStorage.getItem('selectedPersonId');
            if (savedId && savedId !== 'null' && persons.some(p => p.id === savedId)) {
                selectedPersonId = savedId;
            } else {
                // 默认不选中任何成员，显示全部
                selectedPersonId = null;
            }

            renderPersons();
            updatePersonSelect();
            updateMemberCount(); // 更新快速操作区成员数量
            updateFilterSelects(); // Update filter dropdowns when visible
        }

        async function loadVisits(personId = null) {
            const url = personId ? `/api/visits?person_id=${personId}` : '/api/visits';
            const visits = await fetchAPI(url);
            renderVisits(visits);

            // Extract unique doctors from visits
            const doctorSet = new Set();
            visits.forEach(v => {
                if (v.doctor) {
                    doctorSet.add(v.doctor);
                }
            });
            doctors = Array.from(doctorSet).sort();

            updateFilterSelects(); // Update filter dropdowns when visible
        }

        // Update all filter dropdowns if the panel is visible
        function updateFilterSelects() {
            const panel = document.getElementById('filtersPanel');
            if (!panel.classList.contains('hidden')) {
                updateFilterPersonSelect();
                updateFilterDoctorSelect();
            }
        }

        // ==================== Render ====================
        function renderPersons() {
            const container = document.getElementById('personsList');
            if (persons.length === 0) {
                container.innerHTML = '<div class="text-gray-500 text-center py-8">暂无成员，点击"添加成员"创建</div>';
                return;
            }

            let html = '<div class="flex gap-4">';
            persons.forEach(function(p) {
                const isSelected = selectedPersonId === p.id;
                const bgColor = isSelected
                    ? 'background: linear-gradient(135deg, #3b82f6, #1d4ed8);'
                    : 'background-color: #f8fafc; border: 1px solid #e2e8f0;';
                const textColor = isSelected ? 'text-white' : 'text-gray-900';
                const subTextColor = isSelected ? 'text-blue-100' : 'text-gray-500';
                const btnClass = isSelected ? 'text-white/80 hover:text-white' : 'text-blue-600 hover:text-blue-800';

                html += '<div class="flex-shrink-0 min-w-[140px] p-4 rounded-xl cursor-pointer transition-all duration-200 hover:shadow-md" ' +
                    'style="' + bgColor + '" onclick="selectPersonAndLoadVisits(\'' + p.id + '\')">' +
                    '<div class="flex flex-col items-center text-center">' +
                    '<div class="w-14 h-14 rounded-full flex items-center justify-center mb-3 ' + (isSelected ? 'bg-white/20' : 'bg-blue-100') + '">' +
                    '<svg class="w-7 h-7 ' + (isSelected ? 'text-white' : 'text-blue-600') + '" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                    '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>' +
                    '</svg></div>' +
                    '<div class="font-semibold ' + textColor + ' mb-1">' + escapeHtml(p.name) + '</div>' +
                    '<div class="text-xs ' + subTextColor + ' mb-2">' + formatRelationship(p.relationship) + '</div>' +
                    '<button onclick="event.stopPropagation(); showPersonDetail(\'' + p.id + '\')" class="text-xs ' + btnClass + ' flex items-center gap-1">' +
                    '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">' +
                    '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>' +
                    '</svg>详情</button></div></div>';
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderVisitFilterTabs() {
            const container = document.getElementById('visitFilterTabs');
            let html = '<button onclick="filterVisitsByPerson(null)" class="px-3 py-1.5 rounded-full text-sm font-medium transition-colors ' +
                (selectedPersonId === null ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200') + '">' +
                '全部</button>';

            persons.forEach(function(p) {
                const isActive = selectedPersonId === p.id;
                html += '<button onclick="filterVisitsByPerson(\'' + p.id + '\')" class="px-3 py-1.5 rounded-full text-sm font-medium transition-colors ' +
                    (isActive ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200') + '">' +
                    escapeHtml(p.name) + '</button>';
            });

            container.innerHTML = html;
        }

        function filterVisitsByPerson(id) {
            if (id === 'null' || id === null) {
                selectedPersonId = null;
                localStorage.removeItem('selectedPersonId');
            } else {
                selectedPersonId = id;
                localStorage.setItem('selectedPersonId', id);
            }
            renderPersons();
            renderVisitFilterTabs();
            loadVisits(selectedPersonId);
            updateGreeting();
        }

        function renderVisits(visits) {
            const container = document.getElementById('visitsList');
            renderVisitFilterTabs();

            if (visits.length === 0) {
                container.innerHTML = '<div class="p-8 text-gray-500 text-center">暂无就诊记录</div>';
                return;
            }

            // Sort visits by date (newest first)
            visits.sort((a, b) => new Date(b.visit_date) - new Date(a.visit_date));

            const today = new Date().toISOString().split('T')[0];

            let html = '<div class="timeline-container"><div class="timeline-line"></div>';

            visits.forEach(function(v) {
                const isToday = v.visit_date === today;
                const dotClass = isToday ? 'timeline-dot today' : 'timeline-dot';

                // Calculate relative date
                const visitDate = new Date(v.visit_date);
                const todayDate = new Date(today);
                const diffDays = Math.floor((todayDate - visitDate) / (1000 * 60 * 60 * 24));
                let relativeDate = v.visit_date;
                if (diffDays === 0) relativeDate = '今天';
                else if (diffDays === 1) relativeDate = '昨天';
                else if (diffDays <= 7) relativeDate = diffDays + ' 天前';
                else if (diffDays <= 30) relativeDate = Math.floor(diffDays / 7) + ' 周前';
                else if (diffDays <= 365) relativeDate = Math.floor(diffDays / 30) + ' 个月前';

                // Determine attachment status
                let attachmentStatus = '';
                let hasExtraction = false;
                let hasPending = false;

                if (v.attachments && v.attachments.length > 0) {
                    v.attachments.forEach(function(a) {
                        if (a.has_extraction) hasExtraction = true;
                        else if (!a.has_ocr) hasPending = true;
                    });

                    if (hasExtraction) {
                        attachmentStatus = '<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full">已提取</span>';
                    } else if (hasPending) {
                        attachmentStatus = '<span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-0.5 rounded-full">待处理</span>';
                    } else {
                        attachmentStatus = '<span class="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-full">已识别</span>';
                    }
                }

                html += '<div class="timeline-item">' +
                    '<div class="' + dotClass + '"></div>' +
                    '<div class="timeline-card" onclick="showVisitDetail(\'' + v.id + '\')">' +
                    '<div class="flex justify-between items-start mb-2">' +
                    '<div class="flex items-center gap-2">' +
                    '<span class="text-sm font-medium text-gray-500">' + relativeDate + '</span>' +
                    '<span class="text-xs text-gray-400">' + v.visit_date + '</span>' +
                    (isToday ? '<span class="bg-blue-500 text-white text-xs px-2 py-0.5 rounded-full">今天</span>' : '') +
                    '</div>' +
                    attachmentStatus +
                    '</div>' +
                    '<div class="font-semibold text-gray-900 mb-1">' + (v.hospital || '未知医院') + '</div>' +
                    '<div class="flex flex-wrap gap-2 text-sm text-gray-600">' +
                    (v.department ? '<span class="flex items-center gap-1"><svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>' + escapeHtml(v.department) + '</span>' : '') +
                    '<span class="flex items-center gap-1 text-gray-400">' +
                    '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>' +
                    getPersonName(v.person_id) + '</span>' +
                    '</div>' +
                    (v.diagnosis ? '<div class="mt-2 text-sm"><span class="text-gray-500">诊断：</span><span class="text-gray-800">' + escapeHtml(v.diagnosis) + '</span></div>' : '') +
                    (v.attachments && v.attachments.length > 0 ? '<div class="mt-2 flex items-center gap-1 text-xs text-gray-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>' + v.attachments.length + ' 个附件</div>' : '') +
                    '</div></div>';
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // ==================== Person Actions ====================
        function selectPersonAndLoadVisits(id) {
            selectedPersonId = id;
            localStorage.setItem('selectedPersonId', id);
            renderPersons();
            renderVisitFilterTabs();
            updateGreeting();
            loadVisits(id);
        }

        function showPersonModal() {
            document.getElementById('personModal').classList.add('active');
            document.getElementById('personForm').reset();
            // Reset button groups to default values
            resetButtonGroup('relationBtnGroup', 'self');
            resetButtonGroup('genderBtnGroup', '');
        }

        function closePersonModal() {
            document.getElementById('personModal').classList.remove('active');
        }

        // Button group selection functions
        function selectRelation(el, value) {
            const buttons = el.parentElement.querySelectorAll('.btn-group-item');
            buttons.forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            document.querySelector('input[name="relationship"]').value = value;
        }

        function selectGender(el, value) {
            const buttons = el.parentElement.querySelectorAll('.btn-group-item');
            buttons.forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            document.querySelector('input[name="gender"]').value = value;
        }

        function resetButtonGroup(groupId, defaultValue) {
            const container = document.getElementById(groupId);
            const buttons = container.querySelectorAll('.btn-group-item');
            buttons.forEach(btn => btn.classList.remove('active'));
            // Find and activate the default button
            buttons.forEach(btn => {
                if (btn.onclick && btn.onclick.toString().includes(`'${defaultValue}'`)) {
                    btn.classList.add('active');
                }
            });
        }

        // ==================== Person Detail Modal ====================
        let currentPersonData = null;
        let isEditMode = false;

        async function showPersonDetail(id) {
            const person = persons.find(p => p.id === id);
            if (!person) return;

            currentPersonData = person;
            isEditMode = false;
            renderPersonDetail();
            document.getElementById('personDetailModal').classList.add('active');

            // 加载成员就诊记录
            loadPersonVisits(id);
        }

        // 加载成员就诊记录（最近5条）
        async function loadPersonVisits(personId) {
            try {
                const visits = await fetchAPI(`/api/visits?person_id=${personId}`);
                const container = document.getElementById('personVisitsList');
                if (!container) return;

                if (visits.length === 0) {
                    container.innerHTML = '<p class="text-sm text-gray-400">暂无就诊记录</p>';
                    return;
                }

                // 只显示最近5条
                const recentVisits = visits.slice(0, 5);
                container.innerHTML = recentVisits.map(v => `
                    <div onclick="closePersonDetail(); showVisitDetail('${v.id}')" class="bg-white rounded-lg p-3 cursor-pointer hover:shadow-md transition-shadow border border-gray-100">
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="font-medium text-gray-800">${v.hospital || '未知医院'}</div>
                                <div class="text-sm text-gray-500">${v.department || ''} ${v.diagnosis ? '· ' + escapeHtml(v.diagnosis) : ''}</div>
                            </div>
                            <div class="text-xs text-gray-400">${v.date || ''}</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load person visits:', e);
            }
        }

        function closePersonDetail() {
            document.getElementById('personDetailModal').classList.remove('active');
            currentPersonData = null;
            isEditMode = false;
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            renderPersonDetail();
        }

        function renderPersonDetail() {
            const p = currentPersonData;
            const nameEl = document.getElementById('personDetailName');
            const avatarEl = document.getElementById('personAvatarInitial');
            const basicInfoEl = document.getElementById('personBasicInfo');
            const tagsEl = document.getElementById('personTags');
            const content = document.getElementById('personDetailContent');
            const editBtn = document.getElementById('editToggleBtn');

            // 设置姓名和头像
            nameEl.textContent = p.name;
            avatarEl.textContent = p.name ? p.name.charAt(0).toUpperCase() : '?';

            // 设置基本信息
            const infoParts = [];
            infoParts.push(`<span class="bg-white/20 px-2 py-0.5 rounded text-xs">${formatRelationship(p.relationship)}</span>`);
            if (p.gender) infoParts.push(`<span>${formatGender(p.gender)}</span>`);
            if (p.birth_date) {
                const age = calculateAge(p.birth_date);
                if (age !== null) infoParts.push(`<span>${age}岁</span>`);
            }
            basicInfoEl.innerHTML = infoParts.join('<span class="text-white/40">·</span>');

            // 设置标签
            const tags = [];
            if (p.blood_type) {
                tags.push(`<span class="bg-white/20 text-white text-xs px-2.5 py-1 rounded-full">🩸 ${p.blood_type}</span>`);
            }
            if (p.body_measurements?.height && p.body_measurements?.weight) {
                const bmi = (p.body_measurements.weight / Math.pow(p.body_measurements.height / 100, 2)).toFixed(1);
                tags.push(`<span class="bg-white/20 text-white text-xs px-2.5 py-1 rounded-full">BMI ${bmi}</span>`);
            }
            tagsEl.innerHTML = tags.join('');

            editBtn.textContent = isEditMode ? '取消' : '编辑';

            if (isEditMode) {
                content.innerHTML = renderEditForm(p);
            } else {
                content.innerHTML = renderDetailView(p);
            }
        }

        // 计算年龄
        function calculateAge(birthDate) {
            if (!birthDate) return null;
            const birth = new Date(birthDate);
            const today = new Date();
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                age--;
            }
            return age >= 0 ? age : null;
        }

        function renderDetailView(p) {
            return `
                <div class="space-y-6">
                    <!-- 健康卡片区域 -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        ${renderChronicDiseasesCard(p.chronic_diseases)}
                        ${renderAllergiesCard(p.allergies)}
                        ${renderMedicationsCard(p.current_medications)}
                    </div>

                    <!-- 身体测量 -->
                    ${renderBodyMeasurements(p.body_measurements)}

                    <!-- 既往病史 -->
                    ${renderPastSurgeries(p.past_surgeries)}
                    ${renderHospitalizations(p.hospitalizations)}
                    ${renderMajorIllnesses(p.major_illnesses)}

                    <!-- 家族病史 -->
                    ${renderFamilyHistory(p.family_history)}

                    <!-- 生活习惯 -->
                    ${renderLifestyle(p.lifestyle)}

                    <!-- 就诊历史 -->
                    ${renderPersonVisitsSection(p.id)}

                    <!-- 空状态提示 -->
                    ${isEmpty(p) ? '<div class="text-center text-gray-400 py-8 bg-gray-50 rounded-xl">暂无健康信息，点击"编辑"添加</div>' : ''}
                </div>
            `;
        }

        // 慢性病卡片（黄色背景）
        function renderChronicDiseasesCard(diseases) {
            const hasData = diseases && diseases.length > 0;
            return `
                <div class="bg-amber-50 rounded-xl p-4 border border-amber-100">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center">
                            <span class="text-amber-600 text-lg">🏥</span>
                        </div>
                        <h4 class="font-medium text-amber-900">慢性病史</h4>
                    </div>
                    ${hasData ? `
                        <div class="space-y-2">
                            ${diseases.map(d => `
                                <div class="text-sm">
                                    <span class="font-medium text-gray-800">${escapeHtml(d.name)}</span>
                                    ${d.status ? `<span class="ml-2 text-xs bg-amber-200 text-amber-800 px-1.5 py-0.5 rounded">${formatDiseaseStatus(d.status)}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>

        // ==================== Quick Import from Form ====================
        async function quickImportFromForm() {
            const fileInput = document.getElementById('quickImportFiles');
            const files = fileInput.files;
            const archiveOnly = document.getElementById('archiveOnly').checked;

            if (!files || files.length === 0) {
                alert('请选择文件');
                return;
            }

            // Show progress
            document.getElementById('quickImportProgress').classList.remove('hidden');
            const updateProgress = (message, percent) => {
                document.getElementById('progressBarFill').style.width = percent + '%';
                document.getElementById('progressMessage').textContent = message;
            };
            updateProgress(archiveOnly ? '归档中...' : '上传文件中...', 5);

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }
            formData.append('archive_only', archiveOnly ? 'true' : 'false');
            if (selectedPersonId) {
                formData.append('person_id', selectedPersonId);
            }

            try {
                const res = await fetch(API + '/api/quick-import', {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) throw new Error('请求失败');

                // Read SSE stream
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let result = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const data = line.slice(5).trim();
                            if (!data) continue;

                            try {
                                const event = JSON.parse(data);

                                if (event.stage === 'error') {
                                    throw new Error(event.message);
                                } else if (event.attachment_ids || event.visit_date || event.hospital || event.diagnosis || event.ocr_text) {
                                    // Final result (flattened from ProgressComplete)
                                    result = event;
                                    if (event.attachment_ids) {
                                        uploadedAttachments = event.attachment_ids;
                                    }
                                } else if (event.stage === 'complete') {
                                    // Progress complete event, ignore
                                } else {
                                    // Progress update
                                    updateProgress(event.message, event.progress);
                                }
                            } catch (parseErr) {
                                console.log('SSE parse error:', parseErr, data);
                            }
                        }
                    }
                }

                if (result) {
                    const isArchiveMode = document.getElementById('archiveOnly').checked;
                    if (isArchiveMode) {
                        updateProgress('归档完成！', 100);
                        // Archive mode: show success message and refresh visits
                        const container = document.getElementById('uploadedFiles');
                        container.textContent = '✓ 已归档 ' + files.length + ' 个文件，已创建"待整理"记录';
                        container.className = 'mt-2 text-sm text-green-700';
                        // Reset form and refresh
                        setTimeout(() => {
                            closeVisitModal();

        // ==================== Helpers ====================
        function getPersonName(id) {
            const p = persons.find(p => p.id === id);
            return p ? p.name : '未知';
        }

        function formatRelationship(r) {
            const map = { self: '本人', spouse: '配偶', child: '子女', parent: '父母', sibling: '兄弟姐妹', other: '其他' };
            return map[r] || r;
        }

        function formatGender(g) {
            const map = { male: '男', female: '女', other: '其他' };
            return map[g] || '未知';
        }

        function formatDiseaseStatus(s) {
            const map = { active: '活动期', controlled: '控制中', remission: '缓解期' };
            return map[s] || s || '未知';
        }

        function formatSmoking(s) {
            const map = { never: '从不', former: '已戒烟', current: '吸烟' };
            return map[s] || '未知';
        }

        function formatDrinking(d) {
            const map = { never: '从不', occasional: '偶尔', regular: '经常', former: '已戒酒' };
            return map[d] || '未知';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatBytes(bytes) {
            if (!bytes) return '';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        }

        function getFileIcon(mime) {
            if (!mime) return '📄';
            if (mime.startsWith('image/')) return '🖼️';
            if (mime === 'application/pdf') return '📑';
            return '📄';
        }

        // 判断文件是否可预览
        function isPreviewable(mime) {
            if (!mime) return false;
            // 支持常见图片格式和 PDF
            const supportedImages = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'image/svg+xml', 'image/bmp', 'image/x-bmp', 'image/avif', 'image/ico', 'image/x-icon'];
            if (supportedImages.includes(mime.toLowerCase())) return true;
            if (mime === 'application/pdf') return true;
            return false;
        }

        // 预览相关变量
        let currentZoom = 100;
        const minZoom = 25;
        const maxZoom = 400;

        function openPreview(filePath, filename, mimeType) {
            const modal = document.getElementById('previewModal');
            const img = document.getElementById('previewImage');
            const pdf = document.getElementById('previewPdf');

            document.getElementById('previewFilename').textContent = filename;
            currentZoom = 100;

            if (mimeType === 'application/pdf') {
                img.style.display = 'none';
                pdf.style.display = 'block';
                pdf.src = `/data/${filePath}`;
            } else {
                pdf.style.display = 'none';
                img.style.display = 'block';
                img.src = `/data/${filePath}`;
                img.style.transform = 'scale(1)';
            }

            modal.classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
            document.getElementById('previewImage').src = '';
            document.getElementById('previewPdf').src = '';
        }

        function updateZoom() {
            const img = document.getElementById('previewImage');
            img.style.transform = `scale(${currentZoom / 100})`;
        }

        function zoomIn() {
            if (currentZoom < maxZoom) {
                currentZoom += 25;
                updateZoom();
            }
        }

        function zoomOut() {
            if (currentZoom > minZoom) {
                currentZoom -= 25;
                updateZoom();
            }
        }

        function resetZoom() {
            currentZoom = 100;
            updateZoom();
        }

        // 键盘和滚轮事件
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('previewModal');
            if (!modal.classList.contains('active')) return;

            if (e.key === 'Escape') closePreview();
            if (e.key === '+' || e.key === '=') zoomIn();
            if (e.key === '-') zoomOut();
            if (e.key === '0') resetZoom();
        });

        document.getElementById('previewModal').addEventListener('wheel', (e) => {
            const modal = document.getElementById('previewModal');
            if (!modal.classList.contains('active')) return;

            // 只对图片缩放，PDF 使用浏览器自带缩放
            const img = document.getElementById('previewImage');
            if (img.style.display === 'none') return;

            e.preventDefault();
            if (e.deltaY < 0) {
                zoomIn();
            } else {
                zoomOut();
            }
        });

        function filterByPerson(id) {
            selectedPersonId = id;
            localStorage.setItem('selectedPersonId', id);
            renderPersons();
            loadVisits(id);
        }

        // ==================== Init ====================
        async function init() {
            await loadPersons();
            updateGreeting();
            renderVisitFilterTabs();
            // Load visits - either for selected person or all
            loadVisits(selectedPersonId);
        }
        init();
    </script>
</body>
</html>
